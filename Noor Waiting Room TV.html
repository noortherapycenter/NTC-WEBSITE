  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Noor Therapy Center — Waiting Room Slideshow<\u002Ftitle>\n<style>\n  /* ---------- Reset + stage scaling for a 4K-friendly 16:9 canvas ---------- */\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; color: #1f2e1a; overflow: hidden; cursor: none; }\n\n  /* Brand tokens, lifted from the website */\n  :root {\n    --bg: #fdfaf3;\n    --ink: #1f2e1a;\n    --ink-soft: #4a5c52;\n    --line: #c4bfa8;\n    --brand-green: #2aa63a;\n    --brand-berry: #e5396a;\n    --brand-orange: #f18a2c;\n    --brand-purple: #9b51c7;\n    --brand-blue: #2f6fd6;\n    --brand-pink: #e84e8f;\n    --brand-yellow: #f6c945;\n  }\n\n  /* Stage is a fixed 1920x1080 — outer wrapper letterboxes & scales to fit */\n  .stage-wrap {\n    position: fixed; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    background: #000;\n  }\n  .stage {\n    width: 1920px; height: 1080px; position: relative;\n    transform-origin: center center;\n    background: var(--bg);\n    overflow: hidden;\n  }\n\n  /* ---------- Slides ---------- */\n  .slide {\n    position: absolute; inset: 0;\n    opacity: 0; pointer-events: none;\n    transition: opacity 1.2s ease;\n    display: flex; flex-direction: column;\n    overflow: hidden;\n  }\n  .slide.active { opacity: 1; }\n\n  /* per-slide bg variations */\n  .bg-cream  { background: var(--bg); color: var(--ink); }\n  .bg-green  { background: var(--brand-green); color: #fff; }\n  .bg-yellow { background: var(--brand-yellow); color: var(--ink); }\n  .bg-berry  { background: var(--brand-berry); color: #fff; }\n  .bg-blue   { background: var(--brand-blue); color: #fff; }\n  .bg-purple { background: var(--brand-purple); color: #fff; }\n  .bg-orange { background: var(--brand-orange); color: #fff; }\n\n  /* ---------- Type ---------- */\n  .eyebrow {\n    font-size: 28px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;\n    opacity: 0.7;\n  }\n  h1.title {\n    font-size: 180px; font-weight: 700; letter-spacing: -0.04em; line-height: 0.95;\n    margin: 0;\n  }\n  h1.title.smaller { font-size: 140px; }\n  h2.headline {\n    font-size: 120px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.0;\n    margin: 0;\n  }\n  h2.headline.smaller { font-size: 88px; }\n  .lead {\n    font-size: 44px; line-height: 1.35; max-width: 1200px; font-weight: 500;\n  }\n  .big-stat {\n    font-size: 280px; font-weight: 800; letter-spacing: -0.05em; line-height: 1;\n  }\n  .mono {\n    font-family: ui-monospace, 'SF Mono', Menlo, monospace;\n    letter-spacing: 0.02em;\n  }\n  .italic { font-style: italic; }\n\n  /* ---------- Layout helpers ---------- */\n  .pad { padding: 110px 130px 200px; }\n  .center { align-items: center; justify-content: center; text-align: center; }\n  .col { display: flex; flex-direction: column; }\n  .gap-s { gap: 18px; }\n  .gap-m { gap: 32px; }\n  .gap-l { gap: 56px; }\n  .gap-xl { gap: 80px; }\n\n  /* ---------- Persistent chrome (logo + footer + progress) ---------- */\n  .chrome-top {\n    position: absolute; top: 56px; left: 80px;\n    display: flex; align-items: center; gap: 18px; z-index: 20;\n  }\n  .chrome-top .mark { width: 84px; height: 84px; object-fit: contain; }\n  .chrome-top .mark.color { display: inline-block; }\n  .chrome-top .mark.white { display: none; }\n  .slide.dark .chrome-top .mark.color { display: none; }\n  .slide.dark .chrome-top .mark.white { display: inline-block; }\n  .slide.dark .chrome-top .word { color: #fff; }\n  .slide.dark .chrome-bottom { color: #fff; }\n  .chrome-top .word { font-size: 32px; font-weight: 700; letter-spacing: -0.01em; color: inherit; }\n  .chrome-top .word .green { color: var(--brand-green); }\n  .slide.dark .chrome-top .word .green { color: var(--brand-yellow); }\n\n  .chrome-bottom {\n    position: absolute; bottom: 56px; left: 80px; right: 80px;\n    display: flex; align-items: center; justify-content: space-between; z-index: 20;\n    font-size: 22px; font-weight: 600; opacity: 0.85;\n  }\n  .chrome-bottom .site { letter-spacing: 0.05em; }\n  .progress {\n    display: flex; gap: 10px;\n  }\n  .progress .dot {\n    width: 14px; height: 14px; border-radius: 50%;\n    background: currentColor; opacity: 0.22;\n    transition: all .4s ease;\n  }\n  .progress .dot.active { opacity: 1; width: 44px; border-radius: 8px; }\n\n  /* ---------- Floating decorations ---------- */\n  .deco { position: absolute; pointer-events: none; }\n  @keyframes float-a { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-18px) rotate(6deg); } }\n  @keyframes float-b { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(22px) rotate(-8deg); } }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }\n  .anim-float-a { animation: float-a 5s ease-in-out infinite; }\n  .anim-float-b { animation: float-b 6.5s ease-in-out infinite; }\n  .anim-spin { animation: spin 22s linear infinite; transform-origin: center; }\n  .anim-pulse { animation: pulse 4s ease-in-out infinite; }\n\n  /* ---------- Service tiles ---------- */\n  .svc-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;\n    width: 100%;\n  }\n  .svc-card {\n    background: rgba(255,255,255,0.94); color: var(--ink);\n    border-radius: 32px; padding: 44px;\n    display: flex; flex-direction: column; gap: 22px;\n    border: 2px solid rgba(0,0,0,0.06);\n  }\n  .svc-card .icon-circle {\n    width: 110px; height: 110px; border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .svc-card h3 { font-size: 44px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }\n  .svc-card p { font-size: 26px; line-height: 1.35; margin: 0; color: var(--ink-soft); }\n\n  /* ---------- WiFi card ---------- */\n  .wifi-card {\n    background: #fff; color: var(--ink);\n    border-radius: 48px; padding: 80px 100px;\n    border: 6px solid var(--brand-yellow);\n    box-shadow: 0 30px 80px rgba(0,0,0,0.18);\n    display: flex; flex-direction: column; gap: 36px; min-width: 1100px;\n  }\n  .wifi-row { display: flex; align-items: baseline; gap: 30px; border-bottom: 2px dashed var(--line); padding-bottom: 18px; }\n  .wifi-row:last-child { border-bottom: 0; padding-bottom: 0; }\n  .wifi-row .label { font-size: 30px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; width: 220px; }\n  .wifi-row .value { font-size: 72px; font-weight: 700; letter-spacing: -0.02em; }\n  .wifi-row .value.mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }\n\n  /* ---------- Hours block ---------- */\n  .hours-block { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; }\n  .hours-card {\n    background: rgba(255,255,255,0.95); color: var(--ink);\n    border-radius: 32px; padding: 50px 56px;\n    display: flex; flex-direction: column; gap: 16px;\n  }\n  .hours-card h3 { font-size: 36px; margin: 0; letter-spacing: -0.01em; }\n  .hours-card .line { font-size: 30px; line-height: 1.5; }\n  .hours-card .big { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; }\n\n  /* ---------- Quote ---------- */\n  .quote {\n    font-family: 'Fraunces', Georgia, serif;\n    font-size: 130px; font-weight: 500; line-height: 1.05; letter-spacing: -0.02em;\n    max-width: 1400px;\n    text-align: center;\n  }\n  .quote.smaller { font-size: 100px; }\n  .quote-mark {\n    font-family: 'Fraunces', Georgia, serif;\n    font-size: 280px; line-height: 0.5; opacity: 0.45;\n  }\n  .attribution {\n    font-size: 32px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;\n    opacity: 0.8; margin-top: 30px;\n  }\n\n  /* ---------- Tip card ---------- */\n  .tip-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; width: 100%;\n  }\n\n  /* ---------- Hello multilanguage ---------- */\n  .hello-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 60px; width: 100%;\n  }\n  .hello-item { display: flex; flex-direction: column; gap: 6px; }\n  .hello-item .word {\n    font-family: 'Fraunces', Georgia, serif; font-weight: 500;\n    font-size: 76px; letter-spacing: -0.02em; line-height: 1;\n    white-space: nowrap;\n  }\n  .hello-item .lang {\n    font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.7; font-weight: 700;\n  }\n\n  /* ---------- Fun fact ---------- */\n  .fact-bubble {\n    background: #fff; color: var(--ink);\n    border-radius: 60px; padding: 90px 110px;\n    box-shadow: 0 30px 60px rgba(0,0,0,0.15);\n    max-width: 1500px; position: relative;\n  }\n  .fact-bubble::after {\n    content: ''; position: absolute;\n    bottom: -50px; left: 200px;\n    width: 90px; height: 80px;\n    background: #fff;\n    clip-path: polygon(0 0, 100% 0, 60% 100%);\n  }\n\n  /* Right-side image column placeholder gradients */\n  .imgblock {\n    border-radius: 40px; height: 100%; min-height: 600px; width: 100%;\n    background-size: cover; background-position: center;\n    border: 1px solid rgba(0,0,0,0.06);\n  }\n\n  /* Auto-scroll for the services slide */\n  .scroll-list { transform: translateY(0); will-change: transform; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"stage-wrap\" id=\"stageWrap\">\n  <div class=\"stage\" id=\"stage\">\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 1 — Welcome -->\n    <!-- ============================================================== -->\n    <section class=\"slide active bg-cream center pad col\" data-bg=\"cream\">\n      <!-- bg decoration -->\n      <svg class=\"deco anim-spin\" style=\"top:80px; right:120px; width:220px; height:220px;\" viewBox=\"0 0 100 100\">\n        <circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"var(--brand-yellow)\"><\u002Fcircle>\n        <g><!-- rays -->\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(30 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(60 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(90 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(120 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(150 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(180 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(210 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(240 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(270 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(300 50 50)\"><\u002Frect>\n          <rect x=\"48\" y=\"3\" width=\"4\" height=\"12\" rx=\"2\" fill=\"var(--brand-orange)\" transform=\"rotate(330 50 50)\"><\u002Frect>\n        <\u002Fg>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-a\" style=\"bottom:120px; left:120px; width:160px; height:160px;\" viewBox=\"0 0 80 64\">\n        <ellipse cx=\"22\" cy=\"40\" rx=\"14\" ry=\"12\" fill=\"var(--brand-blue)\"><\u002Fellipse>\n        <ellipse cx=\"40\" cy=\"32\" rx=\"18\" ry=\"16\" fill=\"var(--brand-blue)\"><\u002Fellipse>\n        <ellipse cx=\"58\" cy=\"40\" rx=\"14\" ry=\"12\" fill=\"var(--brand-blue)\"><\u002Fellipse>\n        <ellipse cx=\"40\" cy=\"44\" rx=\"24\" ry=\"10\" fill=\"var(--brand-blue)\"><\u002Fellipse>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"top:200px; left:200px; width:120px; height:120px;\" viewBox=\"0 0 70 60\">\n        <ellipse cx=\"20\" cy=\"22\" rx=\"14\" ry=\"12\" fill=\"var(--brand-purple)\"><\u002Fellipse>\n        <ellipse cx=\"50\" cy=\"22\" rx=\"14\" ry=\"12\" fill=\"var(--brand-purple)\"><\u002Fellipse>\n        <ellipse cx=\"22\" cy=\"40\" rx=\"10\" ry=\"9\" fill=\"var(--brand-berry)\"><\u002Fellipse>\n        <ellipse cx=\"48\" cy=\"40\" rx=\"10\" ry=\"9\" fill=\"var(--brand-berry)\"><\u002Fellipse>\n        <ellipse cx=\"35\" cy=\"30\" rx=\"3\" ry=\"14\" fill=\"var(--brand-orange)\"><\u002Fellipse>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"bottom:200px; right:180px; width:140px; height:90px;\" viewBox=\"0 0 80 50\">\n        <path d=\"M6 46 A34 34 0 0 1 74 46\" fill=\"none\" stroke=\"var(--brand-berry)\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M14 46 A26 26 0 0 1 66 46\" fill=\"none\" stroke=\"var(--brand-orange)\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M22 46 A18 18 0 0 1 58 46\" fill=\"none\" stroke=\"var(--brand-yellow)\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M30 46 A10 10 0 0 1 50 46\" fill=\"none\" stroke=\"var(--brand-green)\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <div class=\"col center\" style=\"z-index:5; gap: 40px;\">\n        <img src=\"ba1798d2-e838-4386-ab42-3e2caa3a3967\" alt=\"\" style=\"width: 360px; height: auto; margin-bottom: -30px;\">\n        <div class=\"col center\" style=\"gap: 14px;\">\n          <div style=\"font-size: 96px; font-weight: 700; letter-spacing: 0.02em; color: var(--brand-green); line-height: 1;\">NOOR THERAPY CENTER<\u002Fdiv>\n          <div style=\"font-size: 32px; font-weight: 700; letter-spacing: 0.22em; color: var(--brand-berry); text-transform: uppercase;\">Letting every light shine bright<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lead\" style=\"color: var(--ink-soft); text-align:center;\">\n          We're so glad you're here. Make yourself comfortable — our team will be with you shortly.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 2 — Hello in many languages -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-green pad col dark\" data-bg=\"green\">\n      <svg class=\"deco anim-float-a\" style=\"top:120px; right:160px; width:140px; height:140px;\" viewBox=\"0 0 64 60\">\n        <path d=\"M32 54 C8 38 6 22 18 14 C26 9 32 16 32 22 C32 16 38 9 46 14 C58 22 56 38 32 54 Z\" fill=\"var(--brand-yellow)\"><\u002Fpath>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"bottom:130px; left:140px; width:160px; height:120px;\" viewBox=\"0 0 64 64\">\n        <path d=\"M32 6 L38 26 L58 26 L42 38 L48 58 L32 46 L16 58 L22 38 L6 26 L26 26 Z\" fill=\"var(--brand-yellow)\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <div class=\"col gap-l\" style=\"margin-top:120px; z-index:5;\">\n        <div class=\"eyebrow\">A warm hello, in your language<\u002Fdiv>\n        <div class=\"hello-grid\">\n          <div class=\"hello-item\"><div class=\"word\">Hello<\u002Fdiv><div class=\"lang\">English<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">مرحبا<\u002Fdiv><div class=\"lang\">Arabic<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">Soo dhowoow<\u002Fdiv><div class=\"lang\">Somali<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">Hola<\u002Fdiv><div class=\"lang\">Spanish<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">Nyob zoo<\u002Fdiv><div class=\"lang\">Hmong<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">Sawubona<\u002Fdiv><div class=\"lang\">Zulu<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">Bonjour<\u002Fdiv><div class=\"lang\">French<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">नमस्ते<\u002Fdiv><div class=\"lang\">Hindi<\u002Fdiv><\u002Fdiv>\n          <div class=\"hello-item\"><div class=\"word\">你好<\u002Fdiv><div class=\"lang\">Mandarin<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 3 — Services (auto-scrolling, matches website) -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-cream col\" data-bg=\"cream\" data-duration=\"26000\">\n      <!-- Fixed header -->\n      <div style=\"padding: 200px 130px 0 130px; flex-shrink: 0;\">\n        <div class=\"eyebrow\" style=\"color: var(--brand-orange);\">Our services<\u002Fdiv>\n        <h2 class=\"headline\" style=\"margin-top: 18px;\">Care that fits<br>every child<span style=\"color: var(--brand-green);\">.<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n\n      <!-- Scrolling viewport -->\n      <div class=\"scroll-viewport\" style=\"flex: 1; overflow: hidden; padding: 60px 130px 0; position: relative; -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 80px, #000 calc(100% - 80px), transparent 100%); mask-image: linear-gradient(to bottom, transparent 0, #000 80px, #000 calc(100% - 80px), transparent 100%);\">\n        <div class=\"scroll-list\" style=\"display: flex; flex-direction: column; gap: 36px;\">\n\n          <!-- Part-time ABA -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px;\">\n            <div class=\"icon-circle\" style=\"background: color-mix(in srgb, var(--brand-purple) 16%, white); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"6\" y=\"3\" width=\"12\" height=\"18\" rx=\"2\" stroke=\"var(--brand-purple)\" stroke-width=\"2.4\"><\u002Frect><path d=\"M9 3v2h6V3M9 11h6M9 15h6M9 7h6\" stroke=\"var(--brand-purple)\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color:var(--brand-purple); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">~ 20 hrs / week<\u002Fdiv>\n              <h3 style=\"font-size:60px;\">Part-time ABA<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px;\">Targeted skill-building and behavior reduction. Pairs well with school, speech, and OT — works around the rest of your child's day.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Full-time ABA -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px;\">\n            <div class=\"icon-circle\" style=\"background: color-mix(in srgb, var(--brand-berry) 16%, white); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2l2.5 6 6.5.5-5 4.5 1.5 6.5L12 16l-5.5 3.5L8 13 3 8.5l6.5-.5L12 2z\" fill=\"var(--brand-berry)\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color:var(--brand-berry); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">~ 40 hrs / week · Early intervention<\u002Fdiv>\n              <h3 style=\"font-size:60px;\">Full-time ABA<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px;\">All-encompassing early intervention: ABA plus integrated speech, OT, and community engagement under one coordinated plan.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Speech therapy -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px;\">\n            <div class=\"icon-circle\" style=\"background: color-mix(in srgb, var(--brand-pink) 16%, white); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 12a8 8 0 0 1 16 0v3a3 3 0 0 1-3 3h-1v-6h4M4 12v3a3 3 0 0 0 3 3h1v-6H4\" stroke=\"var(--brand-pink)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color:var(--brand-pink); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">Standalone or paired<\u002Fdiv>\n              <h3 style=\"font-size:60px;\">Speech therapy<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px;\">SLPs working on AAC, articulation, expressive &amp; receptive language, and social/pragmatic communication.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Occupational therapy -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px;\">\n            <div class=\"icon-circle\" style=\"background: color-mix(in srgb, var(--brand-orange) 16%, white); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 11V6a2 2 0 1 1 4 0v4M11 10V4a2 2 0 1 1 4 0v6M15 10V6a2 2 0 1 1 4 0v8a6 6 0 0 1-12 0v-3a2 2 0 1 1 4 0\" stroke=\"var(--brand-orange)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color:var(--brand-orange); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">Standalone or paired<\u002Fdiv>\n              <h3 style=\"font-size:60px;\">Occupational therapy<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px;\">OTs targeting sensory regulation, fine motor, feeding, and daily living skills — tailored to each child.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Parent training -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px;\">\n            <div class=\"icon-circle\" style=\"background: color-mix(in srgb, var(--brand-blue) 16%, white); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"9\" cy=\"9\" r=\"3\" stroke=\"var(--brand-blue)\" stroke-width=\"2.6\"><\u002Fcircle><circle cx=\"17\" cy=\"9\" r=\"2.4\" stroke=\"var(--brand-blue)\" stroke-width=\"2.6\"><\u002Fcircle><path d=\"M3 19c0-2.8 2.7-5 6-5s6 2.2 6 5M15 19c0-2.1 1.7-4 4-4s2 0 2 0\" stroke=\"var(--brand-blue)\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color:var(--brand-blue); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">Caregivers · 8-week curriculum<\u002Fdiv>\n              <h3 style=\"font-size:60px;\">Parent training<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px;\">You learn the strategies your team is using — so progress at the table becomes progress at home.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Setting card -->\n          <div class=\"svc-card\" style=\"padding: 56px; flex-direction: row; align-items: center; gap: 40px; background: var(--brand-green); color: #fff; border-color: transparent;\">\n            <div class=\"icon-circle\" style=\"background: rgba(255,255,255,0.2); width: 160px; height: 160px; flex-shrink: 0;\">\n              <svg width=\"86\" height=\"86\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 12l9-8 9 8M5 10v10h14V10\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex: 1;\">\n              <div style=\"font-size:24px; color: var(--brand-yellow); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom: 8px;\">Where care happens<\u002Fdiv>\n              <h3 style=\"font-size:60px; color: #fff;\">In-home · Center-based · Hybrid<\u002Fh3>\n              <p style=\"font-size:30px; margin-top: 12px; color: rgba(255,255,255,0.92);\">Care wherever serves your child best — at our St. Louis Park center, in your home across the Twin Cities, or any mix.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 4 — Office hours + contact -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-blue pad col dark\" data-bg=\"blue\">\n      <svg class=\"deco anim-spin\" style=\"top:80px; right:120px; width:200px; height:200px; opacity:0.25;\" viewBox=\"0 0 100 100\">\n        <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-dasharray=\"4 8\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"20\" r=\"6\" fill=\"var(--brand-yellow)\"><\u002Fcircle>\n      <\u002Fsvg>\n\n      <div class=\"col gap-l\" style=\"margin-top:80px;\">\n        <div class=\"eyebrow\">When &amp; where we are<\u002Fdiv>\n        <h2 class=\"headline\">Open seven<br>days a week.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"hours-block\" style=\"margin-top:60px;\">\n        <div class=\"hours-card\">\n          <h3 style=\"color: var(--brand-green);\">Hours<\u002Fh3>\n          <div class=\"big\">8 am – 6 pm<\u002Fdiv>\n          <div class=\"line\" style=\"color: var(--ink-soft);\">Monday through Sunday<\u002Fdiv>\n          <div class=\"line\" style=\"color: var(--ink-soft); margin-top:14px;\">In-home schedules are flexible — early morning, after school, and weekends.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hours-card\">\n          <h3 style=\"color: var(--brand-berry);\">Find us<\u002Fh3>\n          <div class=\"line\"><strong>6250 Excelsior Blvd, Suite 102<\u002Fstrong><\u002Fdiv>\n          <div class=\"line\">St. Louis Park, MN 55416<\u002Fdiv>\n          <div class=\"line\" style=\"margin-top:20px;\">📞 (612) 703-9022<\u002Fdiv>\n          <div class=\"line\">✉ info@noortherapycenter.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 5 — WiFi -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-yellow center pad col\" data-bg=\"yellow\">\n      <svg class=\"deco anim-float-a\" style=\"top:120px; right:200px; width:170px; height:170px;\" viewBox=\"0 0 64 64\">\n        <path d=\"M4 22 Q32 4 60 22 M10 30 Q32 16 54 30 M16 38 Q32 28 48 38\" fill=\"none\" stroke=\"var(--ink)\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n        <circle cx=\"32\" cy=\"48\" r=\"5\" fill=\"var(--ink)\"><\u002Fcircle>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"bottom:160px; left:180px; width:130px; height:130px;\" viewBox=\"0 0 60 80\">\n        <polygon points=\"30,4 54,30 30,58 6,30\" fill=\"var(--brand-green)\"><\u002Fpolygon>\n        <path d=\"M30 58 Q26 64 30 70 Q34 76 30 78\" stroke=\"var(--brand-orange)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <div class=\"col center gap-m\" style=\"margin-bottom: 50px;\">\n        <div class=\"eyebrow\" style=\"color: var(--ink-soft);\">Guest WiFi<\u002Fdiv>\n        <h2 class=\"headline\">Stay connected while you wait.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"wifi-card\">\n        <div class=\"wifi-row\">\n          <div class=\"label\">Network<\u002Fdiv>\n          <div class=\"value mono\">NoorTherapy<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wifi-row\">\n          <div class=\"label\">Password<\u002Fdiv>\n          <div class=\"value mono\">Admission1!<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 6 — Tip for parents 1 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-cream pad col\" data-bg=\"cream\">\n      <div class=\"tip-grid\" style=\"margin-top:60px; height: calc(100% - 120px);\">\n        <div class=\"col gap-l\">\n          <div class=\"eyebrow\" style=\"color: var(--brand-berry);\">Tip for parents<\u002Fdiv>\n          <h2 class=\"headline\">Celebrate the<br><span style=\"font-style:italic; color: var(--brand-berry);\">small wins<\u002Fspan><span style=\"color: var(--brand-berry);\">.<\u002Fspan><\u002Fh2>\n          <div class=\"lead\" style=\"color: var(--ink-soft);\">\n            Progress in therapy is rarely a straight line. A new word, a calm transition, a few extra seconds of eye contact — these are the wins worth naming out loud.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"background: var(--brand-berry); border-radius: 48px; padding: 70px; color: #fff; transform: rotate(2deg);\">\n            <div style=\"font-family:'Fraunces',Georgia,serif; font-style: italic; font-size: 64px; line-height:1.1;\">\n              \"She asked for water on her own today.\"\n            <\u002Fdiv>\n            <div style=\"margin-top:30px; font-size: 24px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; opacity: 0.85;\">\n              That counts. That's huge.\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <svg class=\"deco anim-float-a\" style=\"top:-40px; right:-40px; width:120px; height:120px;\" viewBox=\"0 0 64 60\">\n            <path d=\"M32 54 C8 38 6 22 18 14 C26 9 32 16 32 22 C32 16 38 9 46 14 C58 22 56 38 32 54 Z\" fill=\"var(--brand-yellow)\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 7 — Fun fact for kids 1 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-purple center pad col dark\" data-bg=\"purple\">\n      <svg class=\"deco anim-spin\" style=\"top:140px; left:160px; width:160px; height:160px;\" viewBox=\"0 0 64 64\">\n        <ellipse cx=\"32\" cy=\"16\" rx=\"9\" ry=\"13\" fill=\"var(--brand-pink)\"><\u002Fellipse>\n        <ellipse cx=\"32\" cy=\"16\" rx=\"9\" ry=\"13\" fill=\"var(--brand-pink)\" transform=\"rotate(72 32 32)\"><\u002Fellipse>\n        <ellipse cx=\"32\" cy=\"16\" rx=\"9\" ry=\"13\" fill=\"var(--brand-pink)\" transform=\"rotate(144 32 32)\"><\u002Fellipse>\n        <ellipse cx=\"32\" cy=\"16\" rx=\"9\" ry=\"13\" fill=\"var(--brand-pink)\" transform=\"rotate(216 32 32)\"><\u002Fellipse>\n        <ellipse cx=\"32\" cy=\"16\" rx=\"9\" ry=\"13\" fill=\"var(--brand-pink)\" transform=\"rotate(288 32 32)\"><\u002Fellipse>\n        <circle cx=\"32\" cy=\"32\" r=\"7\" fill=\"var(--brand-yellow)\"><\u002Fcircle>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"bottom:150px; right:160px; width:160px; height:120px;\" viewBox=\"0 0 80 64\">\n        <ellipse cx=\"22\" cy=\"40\" rx=\"14\" ry=\"12\" fill=\"#fff\" opacity=\"0.95\"><\u002Fellipse>\n        <ellipse cx=\"40\" cy=\"32\" rx=\"18\" ry=\"16\" fill=\"#fff\" opacity=\"0.95\"><\u002Fellipse>\n        <ellipse cx=\"58\" cy=\"40\" rx=\"14\" ry=\"12\" fill=\"#fff\" opacity=\"0.95\"><\u002Fellipse>\n        <ellipse cx=\"40\" cy=\"44\" rx=\"24\" ry=\"10\" fill=\"#fff\" opacity=\"0.95\"><\u002Fellipse>\n      <\u002Fsvg>\n\n      <div class=\"col gap-l center\" style=\"z-index:5;\">\n        <div class=\"eyebrow\" style=\"color: var(--brand-yellow);\">Did you know?<\u002Fdiv>\n        <div class=\"big-stat\" style=\"color: var(--brand-yellow);\">86,400<\u002Fdiv>\n        <div class=\"lead\" style=\"text-align:center; max-width: 1100px;\">\n          That's how many <strong>seconds<\u002Fstrong> you have in one day. Plenty of time for a snack, a song, and a high-five.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 8 — Quote 1 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-cream center pad col\" data-bg=\"cream\">\n      <div class=\"quote-mark\" style=\"color: var(--brand-green); align-self: center; margin-bottom: 50px;\">\"<\u002Fdiv>\n      <div class=\"quote\" style=\"color: var(--ink);\">\n        Every child shines a <span style=\"color: var(--brand-green); font-style: italic;\">different light<\u002Fspan> — our job is to help it grow.\n      <\u002Fdiv>\n      <div class=\"attribution\" style=\"color: var(--brand-green);\">— The Noor Team<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 9 — Tip for parents 2 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-orange pad col dark\" data-bg=\"orange\" style=\"justify-content: center;\">\n      <svg class=\"deco anim-float-a\" style=\"top:100px; right:140px; width:170px; height:170px;\" viewBox=\"0 0 64 64\">\n        <path d=\"M8 52 C8 22 28 6 54 6 C54 30 38 52 8 52 Z\" fill=\"var(--brand-green)\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <div class=\"tip-grid\">\n        <div class=\"col\" style=\"gap: 32px;\">\n          <div class=\"eyebrow\">Tip for parents<\u002Fdiv>\n          <h2 class=\"headline smaller\">Be your child's<br><span style=\"font-style:italic;\">favorite teacher<\u002Fspan>.<\u002Fh2>\n          <div style=\"font-size: 32px; line-height: 1.4; font-weight: 500;\">\n            The hour you spend at home matters more than any hour we spend in the therapy room. Narrate the day. Slow down at transitions. Reinforce what your child is working on.\n          <\u002Fdiv>\n          <div style=\"font-size: 22px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9;\">\n            Ask your BCBA for this week's home target.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:center;\">\n          <div style=\"background: #fff; color: var(--ink); border-radius: 48px; padding: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); width:100%;\">\n            <div style=\"font-size: 32px; font-weight: 800; color: var(--brand-orange); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px;\">\n              Three easy moves\n            <\u002Fdiv>\n            <div class=\"col gap-m\" style=\"font-size: 34px; line-height: 1.35;\">\n              <div style=\"display:flex; gap:24px; align-items:flex-start;\">\n                <div style=\"width: 56px; height:56px; border-radius:50%; background: var(--brand-green); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0;\">1<\u002Fdiv>\n                <div>Get down to their eye level.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:24px; align-items:flex-start;\">\n                <div style=\"width: 56px; height:56px; border-radius:50%; background: var(--brand-berry); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0;\">2<\u002Fdiv>\n                <div>Wait a beat — give them time to respond.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:24px; align-items:flex-start;\">\n                <div style=\"width: 56px; height:56px; border-radius:50%; background: var(--brand-blue); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0;\">3<\u002Fdiv>\n                <div>Celebrate the moment it lands.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 10 — Fun fact for kids 2 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-cream center pad col\" data-bg=\"cream\">\n      <svg class=\"deco anim-float-b\" style=\"top:120px; left:160px; width:140px; height:140px;\" viewBox=\"0 0 50 80\">\n        <ellipse cx=\"25\" cy=\"28\" rx=\"18\" ry=\"22\" fill=\"var(--brand-berry)\"><\u002Fellipse>\n        <polygon points=\"22,50 28,50 25,55\" fill=\"var(--brand-berry)\"><\u002Fpolygon>\n        <path d=\"M25 55 Q20 65 25 78\" stroke=\"var(--brand-berry)\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-a\" style=\"bottom:140px; right:180px; width:130px; height:130px;\" viewBox=\"0 0 64 64\">\n        <path d=\"M32 6 L38 26 L58 26 L42 38 L48 58 L32 46 L16 58 L22 38 L6 26 L26 26 Z\" fill=\"var(--brand-yellow)\" stroke=\"var(--brand-orange)\" stroke-width=\"1.5\" stroke-linejoin=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <div class=\"col gap-l center\" style=\"z-index:5; max-width: 1500px;\">\n        <div class=\"eyebrow\" style=\"color: var(--brand-blue);\">Did you know?<\u002Fdiv>\n        <h2 class=\"headline\">A child takes their<br><span style=\"color: var(--brand-blue); font-style:italic;\">first 1,000 steps<\u002Fspan><\u002Fh2>\n        <div class=\"lead\" style=\"color: var(--ink-soft); text-align:center;\">\n          …before they ever string two words together. Walking, talking, playing — each happens on its own clock. <strong>So does therapy.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 11 — Quote 2 -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-berry center pad col dark\" data-bg=\"berry\">\n      <div class=\"quote-mark\" style=\"color: var(--brand-yellow); align-self: center; margin-bottom: 40px;\">\"<\u002Fdiv>\n      <div class=\"quote smaller\" style=\"color: #fff;\">\n        The way we talk to children<br>becomes their<br><span style=\"color: var(--brand-yellow); font-style: italic;\">inner voice.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"attribution\" style=\"color: var(--brand-yellow);\">— Peggy O'Mara<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================== -->\n    <!-- SLIDE 12 — Closing / Thank you -->\n    <!-- ============================================================== -->\n    <section class=\"slide bg-green center pad col dark\" data-bg=\"green\">\n      <svg class=\"deco anim-spin\" style=\"top:80px; left:120px; width:220px; height:220px; opacity:0.5;\" viewBox=\"0 0 100 100\">\n        <circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"var(--brand-yellow)\"><\u002Fcircle>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-a\" style=\"bottom:140px; right:140px; width:170px; height:170px;\" viewBox=\"0 0 64 60\">\n        <path d=\"M32 54 C8 38 6 22 18 14 C26 9 32 16 32 22 C32 16 38 9 46 14 C58 22 56 38 32 54 Z\" fill=\"var(--brand-yellow)\"><\u002Fpath>\n      <\u002Fsvg>\n      <svg class=\"deco anim-float-b\" style=\"top:200px; right:240px; width:120px; height:120px;\" viewBox=\"0 0 70 60\">\n        <ellipse cx=\"20\" cy=\"22\" rx=\"14\" ry=\"12\" fill=\"var(--brand-purple)\"><\u002Fellipse>\n        <ellipse cx=\"50\" cy=\"22\" rx=\"14\" ry=\"12\" fill=\"var(--brand-purple)\"><\u002Fellipse>\n        <ellipse cx=\"22\" cy=\"40\" rx=\"10\" ry=\"9\" fill=\"var(--brand-berry)\"><\u002Fellipse>\n        <ellipse cx=\"48\" cy=\"40\" rx=\"10\" ry=\"9\" fill=\"var(--brand-berry)\"><\u002Fellipse>\n        <ellipse cx=\"35\" cy=\"30\" rx=\"3\" ry=\"14\" fill=\"var(--brand-orange)\"><\u002Fellipse>\n      <\u002Fsvg>\n\n      <div class=\"col gap-l center\" style=\"z-index:5;\">\n        <div class=\"eyebrow\" style=\"color: var(--brand-yellow);\">Thank you<\u002Fdiv>\n        <h1 class=\"title smaller\">For trusting us with<br>your <span style=\"color: var(--brand-yellow); font-style:italic;\">light<\u002Fspan>.<\u002Fh1>\n        <div style=\"display: inline-grid; grid-template-columns: auto auto; gap: 18px 28px; text-align: left; font-size: 36px; line-height: 1.2; margin-top: 20px;\">\n          <div style=\"font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 28px; opacity: 0.85; align-self: center;\">Phone<\u002Fdiv>\n          <div>(612) 703-9022<\u002Fdiv>\n          <div style=\"font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 28px; opacity: 0.85; align-self: center;\">Email<\u002Fdiv>\n          <div>info@noortherapycenter.com<\u002Fdiv>\n          <div style=\"font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 28px; opacity: 0.85; align-self: center;\">Website<\u002Fdiv>\n          <div>www.noortherapycenter.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============================================================== -->\n<!-- Chrome + progress indicator (overlaid on stage) -->\n<!-- ============================================================== -->\n<template id=\"chrome-template\">\n  <div class=\"chrome-top\">\n    <img class=\"mark color\" src=\"assets/noor-logo-mark.png\" alt=\"Noor Therapy Center\">\n    <img class=\"mark white\" src=\"assets/noor-logo-mark-white.png\" alt=\"\">\n    <div class=\"word\"><span class=\"green\">Noor<\u002Fspan> Therapy Center<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"chrome-bottom\">\n    <div class=\"site\">www.noortherapycenter.com<\u002Fdiv>\n    <div class=\"progress\" id=\"progress\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ftemplate>\n\n<script>\n(function(){\n  const stage    = document.getElementById('stage');\n  const stageWrap= document.getElementById('stageWrap');\n  const slides   = Array.from(stage.querySelectorAll('.slide'));\n\n  // Inject chrome (logo + footer + progress) into every slide so it scales with stage.\n  // Brand color of the chrome adapts based on the slide bg.\n  slides.forEach((slide, i) => {\n    const chrome = document.getElementById('chrome-template').content.cloneNode(true);\n    slide.appendChild(chrome);\n  });\n\n  // Build progress dots inside every slide\n  slides.forEach((slide) => {\n    const prog = slide.querySelector('#progress');\n    if (!prog) return;\n    prog.id = ''; // dedupe\n    slides.forEach(()=> {\n      const d = document.createElement('div'); d.className = 'dot'; prog.appendChild(d);\n    });\n  });\n\n  // Mark active slide + dots\n  let current = 0;\n  let timer = null;\n  function show(n){\n    slides.forEach((s, i) => s.classList.toggle('active', i === n));\n    slides.forEach((s) => {\n      const dots = s.querySelectorAll('.progress .dot');\n      dots.forEach((d, j) => d.classList.toggle('active', j === n));\n    });\n    // Reset any scroll animation so it restarts each time the slide becomes active\n    document.querySelectorAll('.scroll-list').forEach(el => {\n      el.style.transition = 'none';\n      el.style.transform = 'translateY(0)';\n    });\n    const active = slides[n];\n    const scroller = active.querySelector('.scroll-list');\n    if (scroller) {\n      const vp = active.querySelector('.scroll-viewport');\n      // End with the LAST card pinned near the TOP of the viewport (with a small margin)\n      const lastCard = scroller.lastElementChild;\n      const topMargin = 40;\n      const targetTranslate = -(lastCard.offsetTop - topMargin);\n      const dist = Math.max(0, -targetTranslate);\n      const dur = parseInt(active.dataset.duration, 10) || 10000;\n      // No intro lift — start scrolling immediately. Reserve 2s dwell at end.\n      const dwellMs = 2000;\n      const scrollMs = Math.max(1000, dur - dwellMs);\n      // Force browser to commit the reset before starting the animation\n      void scroller.offsetWidth;\n      requestAnimationFrame(() => {\n        scroller.style.transition = `transform ${scrollMs/1000}s linear`;\n        scroller.style.transform = `translateY(-${dist}px)`;\n      });\n    }\n  }\n  show(0);\n\n  // Auto-advance (per-slide duration via data-duration, default 10s)\n  function scheduleNext(){\n    const dur = parseInt(slides[current].dataset.duration, 10) || 10000;\n    timer = setTimeout(() => {\n      current = (current + 1) % slides.length;\n      show(current);\n      scheduleNext();\n    }, dur);\n  }\n  scheduleNext();\n\n  // Allow ←/→/space for manual debugging (hidden cursor on TV anyway)\n  document.addEventListener('keydown', (e)=>{\n    clearTimeout(timer);\n    if (e.key === 'ArrowRight' || e.key === ' ') { current = (current+1) % slides.length; show(current); }\n    if (e.key === 'ArrowLeft')  { current = (current-1+slides.length) % slides.length; show(current); }\n    scheduleNext();\n  });\n\n  // Scale stage to fit viewport while keeping 16:9\n  function fit(){\n    const vw = stageWrap.clientWidth, vh = stageWrap.clientHeight;\n    const scale = Math.min(vw / 1920, vh / 1080);\n    stage.style.transform = `scale(${scale})`;\n  }\n  fit();\n  window.addEventListener('resize', fit);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
