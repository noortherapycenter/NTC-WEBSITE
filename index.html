<style>
  :root {
    /* Noor brand (default) — pulled from the logo */
    --bg: #fdfaf3;
    --surface: #ffffff;
    --ink: #1f2e1a;
    --ink-soft: #1f2e1a;
    --muted: #8a9482;
    --line: #c4bfa8;
    --brand-green: #2aa63a;      /* bowl green, wordmark */
    --brand-berry: #e5396a;      /* tagline pink */
    --brand-orange: #f18a2c;     /* leaf orange */
    --brand-purple: #9b51c7;     /* circle purple */
    --brand-blue: #2f6fd6;       /* X blue */
    --brand-pink: #e84e8f;       /* square pink */
    --brand-yellow: #f6c945;     /* highlight */
    --p1: var(--brand-green);
    --p2: var(--brand-orange);
    --p3: var(--brand-blue);
    --p4: var(--brand-purple);
    --p5: var(--brand-berry);
    --sun: var(--brand-yellow);
    --accent: var(--brand-green);
    --radius: 18px;
    --radius-lg: 28px;
    --shadow: 0 1px 0 rgba(31,46,26,0.04), 0 20px 60px -30px rgba(31,46,26,0.25);
  }

  /* Playground theme */
  [data-theme="playground"] {
    --bg: #fffbf0;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #525252;
    --muted: #8a8a8a;
    --line: #ecdfbd;
    --p1: #ef4444;
    --p2: #facc15;
    --p3: #22c55e;
    --p4: #3b82f6;
    --p5: #a855f7;
    --sun: #facc15;
    --accent: var(--p4);
  }
  /* Meadow theme */
  [data-theme="meadow"] {
    --bg: #f2f7ee;
    --surface: #ffffff;
    --ink: #1f2d25;
    --ink-soft: #4a5c52;
    --muted: #8aa095;
    --line: #dbe7d3;
    --p1: #4a8f5f;
    --p2: #e9c46a;
    --p3: #78b4d1;
    --p4: #2f5d3f;
    --p5: #e07856;
    --sun: #e9c46a;
    --accent: var(--p1);
  }
  /* Mosaic theme */
  [data-theme="mosaic"] {
    --bg: #faf3ea;
    --surface: #ffffff;
    --ink: #1a1f3a;
    --ink-soft: #4a4f6a;
    --muted: #8e8ea5;
    --line: #e4dbcc;
    --p1: #c2410c;
    --p2: #eab308;
    --p3: #0e7c7b;
    --p4: #7c2d92;
    --p5: #be185d;
    --sun: #eab308;
    --accent: var(--p3);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin: 0; color: var(--ink); }
  h1 { font-size: clamp(44px, 6vw, 88px); font-weight: 600; letter-spacing: -0.035em; }
  h2 { font-size: clamp(32px, 4vw, 54px); font-weight: 600; letter-spacing: -0.03em; }
  h3 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  h4 { font-size: 19px; font-weight: 700; font-family: 'DM Sans', sans-serif; letter-spacing: -0.01em; }
  p { margin: 0; text-wrap: pretty; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { display: block; max-width: 100%; }

  .mono { font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }

  /* Layout shell */
  .page-wrap { min-height: 100vh; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .container-sm { max-width: 960px; margin: 0 auto; padding: 0 32px; }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; max-width: 1400px; margin: 0 auto; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; letter-spacing: -0.01em; white-space: nowrap; flex-shrink: 0; }
  .logo > div > span { white-space: nowrap; }
  @media (max-width: 760px) {
    .logo-tagline { display: none; }
  }
  @media (max-width: 980px) {
    .logo-wordmark { display: none; }
  }
  .logo-mark { width: 36px; height: 36px; position: relative; }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { padding: 8px 14px; border-radius: 999px; font-weight: 600; font-size: 15px; color: var(--ink-soft); transition: all .15s; cursor: pointer; }
  .nav-link:hover { background: color-mix(in srgb, var(--brand-green) 18%, transparent); color: var(--brand-green); }
  .nav-link.active { background: var(--brand-green); color: #fff; }
  .nav-cta { display: flex; gap: 10px; align-items: center; }
  .lang { font-size: 13px; font-weight: 600; color: var(--ink-soft); padding: 6px 10px; border-radius: 999px; border: 1px solid var(--line); cursor: pointer; }
  .lang:hover { border-color: var(--ink); }

  /* Hide Google Translate's own UI chrome */
  .goog-te-banner-frame.skiptranslate,
  .goog-te-gadget-icon,
  .goog-te-gadget-simple,
  .goog-logo-link,
  #goog-gt-tt,
  .goog-te-balloon-frame,
  iframe.goog-te-menu-frame { display: none !important; }
  .goog-tooltip, .goog-tooltip:hover { display: none !important; }
  .goog-text-highlight { background: none !important; box-shadow: none !important; }
  body { top: 0 !important; position: static !important; }
  #google_translate_element { position: absolute; left: -9999px; top: -9999px; height: 0; width: 0; overflow: hidden; }
  font, font * { font: inherit !important; color: inherit !important; background: none !important; }
  html[dir="rtl"] .nav-inner { flex-direction: row-reverse; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 22px; border-radius: 999px; font-weight: 700; font-size: 15px; transition: all .2s; cursor: pointer; white-space: nowrap; border: 1.5px solid transparent; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { transform: translateY(-1px); background: var(--p1); }
  .btn-accent { background: var(--p1); color: #fff; }
  .btn-accent:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--ink); background: var(--surface); }
  .btn-big { padding: 18px 28px; font-size: 16px; }

  /* Tag / pill */
  .tag { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--p3); display: inline-block; }

  /* Card */
  .card { background: var(--surface); border-radius: var(--radius-lg); padding: 32px; border: 1.5px solid var(--line); }
  .card-flat { background: var(--surface); border-radius: var(--radius); padding: 24px; border: 1.5px solid var(--line); }

  /* Section */
  .section { padding: 64px 0; }
  .section-sm { padding: 44px 0; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--p1); margin-bottom: 20px; }
  .eyebrow::before { content: ""; width: 24px; height: 2px; background: var(--p1); border-radius: 2px; }

  /* Footer */
  footer { background: var(--ink); color: var(--bg); padding: 80px 0 40px; margin-top: 120px; }
  footer a:hover { color: var(--sun); }

  /* Utilities */
  .grid { display: grid; gap: 24px; }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .nav-links { display: none !important; }
    .nav-hamburger { display: inline-flex !important; }
    .nav-intake-btn { display: none; }
    .container, .container-sm { padding: 0 22px; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 880px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr !important; }
    h1 { font-size: clamp(32px, 8vw, 44px) !important; }
    h2 { font-size: clamp(28px, 6vw, 38px) !important; }
    h3 { font-size: 22px; }
    .section { padding: 56px 0; }
    .section-sm { padding: 40px 0; }
    .nav-inner { padding: 14px 20px; }
    footer { padding: 48px 0 24px; margin-top: 72px; }
    .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .form-2col { grid-template-columns: 1fr !important; }
    /* Page-specific responsive fixes */
    .about-photo-grid { grid-template-columns: 1fr !important; }
    .about-mission { grid-template-columns: 1fr !important; gap: 24px !important; }
    .about-stats { gap: 12px !important; }
    .service-card-inner { grid-template-columns: 1fr !important; }
    .service-card-includes { border-left: none !important; border-top: 1px solid var(--line); }
    .approach-block { grid-template-columns: 1fr !important; gap: 16px !important; }
    .approach-num { font-size: 56px !important; }
    .families-timeline-line { display: none; }
    .families-step { grid-template-columns: 48px 1fr !important; gap: 14px !important; }
    .families-cards { grid-template-columns: 1fr !important; }
    .career-row { grid-template-columns: auto 1fr !important; grid-template-rows: auto auto; }
    .career-row > .btn { grid-column: 1 / -1; justify-content: center; }
    .career-bar { grid-row: 1 / 3; }
    .resources-grid { grid-template-columns: 1fr !important; }
    /* Contact page */
    .container > div[style*="grid-template-columns: 1fr 1.6fr"] { grid-template-columns: 1fr !important; }
    .container > div[style*="gridTemplateColumns"] { grid-template-columns: 1fr !important; }
    .card { padding: 24px !important; }
  }
  @media (max-width: 560px) {
    .btn-big { padding: 14px 20px; font-size: 15px; }
    .tweaks-panel { right: 10px; bottom: 10px; width: calc(100vw - 20px); }
  }

  /* ---------- Mobile polish (phones) ---------- */
  @media (max-width: 680px) {
    /* Prevent horizontal scroll from decorative absolute SVGs */
    body, html { overflow-x: hidden; }
    /* Container hugs the edges less on phones */
    .container, .container-sm { padding: 0 18px; }
    /* Tame huge section paddings on phones */
    .section { padding: 48px 0 !important; }
    .section-sm { padding: 32px 0 !important; }
    /* Hero image grid: stack to 1 column with a sane height */
    .hero-imagery-grid { grid-template-columns: 1fr !important; grid-auto-rows: 220px !important; margin-top: 48px !important; gap: 12px !important; }
    .hero-imagery-grid > * { grid-row: auto !important; }
    /* Hide oversized decorative floating shapes that overflow on phones */
    .hero-decor { display: none !important; }
    /* Hero: tighter top/bottom padding */
    .hero-section { padding-top: 40px !important; padding-bottom: 32px !important; }
    .hero-title-break { display: none; } /* let headline flow naturally */
    .hero-sub { font-size: 17px !important; }
    /* Approach band: less padding, hide corner sun */
    .approach-band { padding: 72px 0 !important; }
    .approach-band-decor { display: none !important; }
    /* Journey section: drop the connecting line, let step cards stack */
    .journey-line { display: none !important; }
    /* Nav inner on tiny phones */
    .nav-inner { padding: 12px 16px !important; gap: 10px !important; }
    .logo { font-size: 18px !important; }
    /* Footer a little tighter */
    footer { padding: 40px 0 20px !important; }
    /* Hero trust row wraps tighter */
    .hero-trust { gap: 18px !important; font-size: 13px !important; }
    /* PageHero tighter on phones */
    .page-hero { padding: 48px 0 24px !important; }
  }
  .stack-lg > * + * { margin-top: 48px; }
  .stack-md > * + * { margin-top: 24px; }
  .stack-sm > * + * { margin-top: 12px; }

  /* Placeholder illustrations (abstract, no humans) */
  .placeholder {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--line);
  }
  .placeholder-label {
    position: absolute; bottom: 12px; left: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; letter-spacing: 0.08em; font-weight: 700; text-transform: uppercase;
    background: rgba(255,255,255,0.85); color: var(--ink-soft);
    padding: 4px 8px; border-radius: 6px;
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 100;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 20px; padding: 18px; width: 280px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.25);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-title { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); margin-bottom: 6px; }
  .theme-swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .theme-swatch { height: 44px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; position: relative; overflow: hidden; }
  .theme-swatch.active { border-color: var(--ink); }
  .theme-swatch-name { position: absolute; bottom: 2px; left: 4px; font-size: 9px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }

  /* Intake stepper */
  .stepper { display: flex; gap: 8px; margin-bottom: 32px; }
  .step { flex: 1; height: 6px; border-radius: 3px; background: var(--line); transition: background .3s; }
  .step.done { background: var(--p3); }
  .step.active { background: var(--p1); }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--ink); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1.5px solid var(--line); background: var(--surface); color: var(--ink);
    font-family: inherit; font-size: 15px; outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--p1); }
  .radio-group { display: grid; gap: 10px; }
  .radio-option { padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--line); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all .15s; }
  .radio-option:hover { border-color: var(--ink-soft); }
  .radio-option.selected { border-color: var(--p1); background: color-mix(in srgb, var(--p1) 6%, transparent); }
  .radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0; transition: all .15s; }
  .radio-option.selected .radio-dot { border-color: var(--p1); background: radial-gradient(circle, var(--p1) 0 40%, transparent 42%); }

  /* Soft blob shapes */
  .blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.6; pointer-events: none; }

  /* Decorative */
  .sun-rays { position: absolute; inset: 0; pointer-events: none; }

  /* Ticker */
  .ticker { overflow: hidden; background: var(--ink); color: var(--bg); padding: 16px 0; border-top: 1px solid color-mix(in srgb, var(--bg) 20%, transparent); border-bottom: 1px solid color-mix(in srgb, var(--bg) 20%, transparent); }
  /* Homepage 6-step journey responsive */
  @media (max-width: 1100px) {
    .home-journey-grid { grid-template-columns: repeat(3, 1fr) !important; }
  }
  @media (max-width: 680px) {
    .home-journey-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
    .home-journey-step { padding: 16px 14px !important; }
    .location-split-inner { grid-template-columns: 1fr !important; }
    .location-split-inner > div:last-child { min-height: 240px !important; }
  }
  @media (max-width: 420px) {
    .home-journey-grid { grid-template-columns: 1fr !important; }
  }

  .ticker-track { display: flex; gap: 40px; animation: ticker 28s linear infinite; white-space: nowrap; }
  @media (max-width: 680px) {
    .ticker-track { animation-duration: 18s; gap: 28px; }
    .ticker-item { font-size: 18px; }
  }
  .ticker-item { display: inline-flex; align-items: center; gap: 14px; font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Animated light */
  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.85; }
  }
  .shimmer { animation: shimmer 4s ease-in-out infinite; }

  /* Faq */
  .faq-item { border-bottom: 1px solid var(--line); padding: 24px 0; cursor: pointer; }
  .faq-q { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .faq-a { color: var(--ink-soft); margin-top: 12px; max-width: 760px; display: none; }
  .faq-item.open .faq-a { display: block; }
  .faq-toggle { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .2s; }
  .faq-item.open .faq-toggle { transform: rotate(45deg); background: var(--p1); color: #fff; }

  /* Smooth scroll for anchors */
  html { scroll-behavior: smooth; }

  /* ---------- Services page: hover effect ---------- */
  .service-card {
    transition: transform .35s cubic-bezier(.2,.7,.2,1),
                box-shadow .35s cubic-bezier(.2,.7,.2,1),
                border-color .35s ease,
                border-left-width .35s ease;
    will-change: transform;
  }
  .service-card .service-card-icon {
    transition: transform .45s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease;
  }
  .service-card .service-card-iconwrap {
    transition: background .35s ease;
  }
  .service-card .service-card-title {
    transition: color .25s ease;
  }
  .service-card-shine {
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg,
      transparent 30%,
      color-mix(in srgb, var(--svc-color) 35%, transparent) 50%,
      transparent 70%);
    transform: translateX(-120%);
    transition: transform .9s cubic-bezier(.2,.7,.2,1);
    pointer-events: none;
    mix-blend-mode: soft-light;
  }
  .service-card-incrow {
    transition: transform .35s cubic-bezier(.2,.7,.2,1), color .25s ease;
  }
  .service-card:hover {
    transform: translateY(-4px);
    border-color: color-mix(in srgb, var(--svc-color) 40%, var(--line));
    border-left-width: 14px;
    box-shadow:
      0 1px 0 rgba(31,46,26,0.04),
      0 28px 70px -28px color-mix(in srgb, var(--svc-color) 55%, transparent);
  }
  .service-card:hover .service-card-iconwrap {
    background: color-mix(in srgb, var(--svc-color) 18%, transparent);
  }
  .service-card:hover .service-card-icon {
    transform: scale(1.08) rotate(-3deg);
    box-shadow: 0 14px 28px -10px color-mix(in srgb, var(--svc-color) 65%, transparent);
  }
  .service-card:hover .service-card-shine {
    transform: translateX(120%);
  }
  .service-card:hover .service-card-title {
    color: var(--svc-color);
  }
  .service-card:hover .service-card-incrow {
    transform: translateX(3px);
  }
  /* stagger the rows */
  .service-card:hover .service-card-incrow:nth-child(1) { transition-delay: 0ms; }
  .service-card:hover .service-card-incrow:nth-child(2) { transition-delay: 40ms; }
  .service-card:hover .service-card-incrow:nth-child(3) { transition-delay: 80ms; }
  .service-card:hover .service-card-incrow:nth-child(4) { transition-delay: 120ms; }

  @media (prefers-reduced-motion: reduce) {
    .service-card, .service-card *, .service-card-shine { transition: none !important; transform: none !important; }
  }

  /* ========================================================================
     SITE-WIDE HOVER / 3D / MOTION POLISH
     ======================================================================== */

  /* Base card: gentle lift if not otherwise specialized */
  .card,
  .card-flat {
    transition: transform .35s cubic-bezier(.2,.7,.2,1),
                box-shadow .35s cubic-bezier(.2,.7,.2,1),
                border-color .25s ease;
  }
  /* Apply lift only to non-special cards — exclude already-specialized ones */
  .card:not(.service-card):not(.location-split):not(.home-journey-step):not(.service-mini):not(.resource-card):not(.area-card):not(.no-lift):hover {
    transform: translateY(-3px);
    box-shadow:
      0 1px 0 rgba(31,46,26,0.04),
      0 22px 50px -26px rgba(31,46,26,0.22);
  }
  .card-flat:not(.no-lift):not(.career-row):hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--ink) 35%, var(--line));
  }

  /* Buttons — small press + glow */
  .btn {
    will-change: transform;
    transition: transform .18s cubic-bezier(.2,.7,.2,1),
                box-shadow .25s ease,
                background .2s ease,
                filter .2s ease,
                border-color .2s ease;
  }
  .btn-primary:hover { box-shadow: 0 14px 28px -14px rgba(31,46,26,0.45); }
  .btn-accent:hover  { box-shadow: 0 14px 28px -14px color-mix(in srgb, var(--p1) 70%, transparent); }
  .btn:active { transform: translateY(1px) scale(0.985); }

  /* Nav link — animated pill underline */
  .nav-link { position: relative; }
  .nav-link::after {
    content: "";
    position: absolute; left: 50%; bottom: 4px;
    width: 0; height: 2px; border-radius: 2px;
    background: var(--brand-green);
    transition: width .25s ease, left .25s ease, background .25s ease;
  }
  .nav-link:hover::after { width: 60%; left: 20%; }
  .nav-link.active::after { width: 0; }

  /* Tag pills */
  .tag { transition: transform .2s ease, border-color .2s ease, background .2s ease; }
  .tag:hover { transform: translateY(-1px); border-color: var(--ink); }

  /* -------- Unified accent-border hover (home service-mini, article cards, area cards) -------- */
  .service-mini, .resource-card, .area-card {
    transition: transform .25s cubic-bezier(.2,.7,.2,1),
                box-shadow .25s ease,
                border-color .25s ease;
  }
  .service-mini:hover,
  .resource-card:hover,
  .area-card:hover {
    transform: translateY(-3px);
    box-shadow:
      0 1px 0 rgba(31,46,26,0.04),
      0 22px 50px -26px color-mix(in srgb, var(--card-color, var(--brand-green)) 35%, rgba(31,46,26,0.22));
    border-color: var(--card-color, var(--brand-green));
  }

  .service-mini {
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .service-mini > * { position: relative; z-index: 1; }

  /* -------- Home: Journey step cards (6 across) -------- */
  .home-journey-step {
    transition: transform .4s cubic-bezier(.2,.7,.2,1),
                box-shadow .4s cubic-bezier(.2,.7,.2,1),
                border-color .25s ease;
    position: relative;
    transform-style: preserve-3d;
  }
  .home-journey-step:hover {
    transform: translateY(-6px);
    box-shadow: 0 22px 44px -22px rgba(31,46,26,0.28);
    border-color: color-mix(in srgb, var(--ink) 25%, var(--line));
  }
  .home-journey-step > div:first-child > div:first-child { /* the numbered circle */
    transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
  }
  .home-journey-step:hover > div:first-child > div:first-child {
    transform: scale(1.12) rotate(-6deg);
    box-shadow: 0 8px 16px -6px rgba(31,46,26,0.35);
  }

  /* -------- Home: Location-split cards (orange/purple) -------- */
  .location-split {
    transition: transform .45s cubic-bezier(.2,.7,.2,1),
                box-shadow .45s cubic-bezier(.2,.7,.2,1);
    transform-style: preserve-3d;
  }
  .location-split > div:first-child { /* decorative sun/moon */
    transition: transform .7s cubic-bezier(.2,.7,.2,1);
  }
  .location-split:hover {
    transform: translateY(-5px) scale(1.005);
    box-shadow: 0 30px 60px -30px rgba(31,46,26,0.5);
  }
  .location-split:hover > div:first-child {
    transform: rotate(18deg) scale(1.08);
  }

  /* -------- Approach band (dark green) 01/02/03 columns -------- */
  .approach-band .grid > div {
    transition: transform .35s cubic-bezier(.2,.7,.2,1),
                border-color .25s ease,
                padding-top .35s ease;
  }
  .approach-band .grid > div:hover {
    transform: translateY(-4px);
    border-top-color: var(--brand-yellow) !important;
  }
  .approach-band .grid > div > div:first-child { /* big number */
    transition: transform .35s cubic-bezier(.2,.7,.2,1), letter-spacing .35s ease;
    transform-origin: left center;
  }
  .approach-band .grid > div:hover > div:first-child {
    transform: translateX(2px) scale(1.08);
    letter-spacing: -0.01em;
  }

  /* -------- Families: step cards (yellow timeline) -------- */
  .families-step .card {
    transition: transform .35s cubic-bezier(.2,.7,.2,1),
                box-shadow .35s ease,
                border-color .25s ease;
  }
  .families-step:hover .card {
    transform: translateX(6px);
    box-shadow: 0 18px 36px -18px rgba(31,46,26,0.25);
  }
  .families-step > div:first-child { /* numbered circle */
    transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
  }
  .families-step:hover > div:first-child {
    transform: scale(1.18);
    box-shadow: 0 10px 20px -6px rgba(31,46,26,0.4);
  }

  /* -------- About: stats cards -------- */
  .about-stats .card { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease; }
  .about-stats .card:hover { transform: translateY(-4px) scale(1.02); }
  .about-stats .card > div:first-child { /* the big number */
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .about-stats .card:hover > div:first-child {
    transform: scale(1.1);
  }

  /* -------- FAQ items: hover indicator -------- */
  .faq-item {
    transition: background .2s ease, padding-left .25s ease;
    border-radius: 8px;
    padding-left: 0;
  }
  .faq-item:not(.open):hover {
    padding-left: 8px;
    background: color-mix(in srgb, var(--brand-green) 5%, transparent);
  }
  .faq-toggle { transition: transform .3s cubic-bezier(.2,.7,.2,1), background .25s ease, color .25s ease; }
  .faq-item:not(.open):hover .faq-toggle { background: var(--p1); color: #fff; transform: rotate(90deg); }

  /* -------- Resource (article) cards -------- */
  .resource-card { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease; overflow: hidden; }
  .resource-card .placeholder,
  .resource-card > div:first-child {
    transition: transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .resource-card:hover > div:first-child { transform: scale(1.06); }

  /* -------- Career openings rows -------- */
  .career-row {
    transition: border-color .2s ease, transform .25s ease, background .2s ease !important;
  }
  .career-row:hover {
    transform: translateX(4px);
    background: color-mix(in srgb, var(--brand-green) 4%, transparent);
  }
  .career-row .career-bar { transition: transform .25s ease, width .25s ease; }
  .career-row:hover .career-bar { transform: scaleY(1.15); }

  /* -------- Decorative hero shapes: float gently -------- */
  @keyframes float-1 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-10px) rotate(3deg); }
  }
  @keyframes float-2 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-14px) rotate(-4deg); }
  }
  @keyframes float-3 {
    0%, 100% { transform: translateY(0) translateX(0); }
    50%      { transform: translateY(-8px) translateX(6px); }
  }
  .hero-decor { animation: float-1 7s ease-in-out infinite; }
  .hero-decor:nth-of-type(2n) { animation: float-2 9s ease-in-out infinite; animation-delay: -2s; }
  .hero-decor:nth-of-type(3n) { animation: float-3 8s ease-in-out infinite; animation-delay: -1s; }

  /* -------- Approach band corner decor: slow spin -------- */
  @keyframes slow-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .approach-band-decor { animation: slow-spin 60s linear infinite; transform-origin: center; }

  /* -------- Logo mark: subtle pulse on hover -------- */
  .logo .logo-mark { transition: transform .4s cubic-bezier(.2,.7,.2,1); }
  .logo:hover .logo-mark { transform: rotate(-8deg) scale(1.08); }

  /* -------- Color-icon flourishes (general) — soft sway on hover-parent -------- */
  .section:hover .hero-decor { animation-play-state: running; }

  /* -------- Theme swatch tweak -------- */
  .theme-swatch { transition: transform .2s ease, border-color .2s ease; }
  .theme-swatch:hover { transform: translateY(-2px) scale(1.04); }

  /* -------- Radio options (intake form) -------- */
  .radio-option { transition: transform .2s ease, border-color .15s ease, background .15s ease; }
  .radio-option:hover { transform: translateX(3px); }

  /* -------- Form fields focus polish -------- */
  .field input, .field select, .field textarea {
    transition: border-color .2s ease, box-shadow .25s ease, transform .2s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--p1) 18%, transparent);
  }

  /* -------- Footer links -------- */
  footer a { transition: color .2s ease, transform .2s ease; display: inline-block; }
  footer a:hover { transform: translateX(2px); }

  /* Reduced motion: kill everything */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
  /* -------- Themed loading splash (shown before React mounts) -------- */
  .noor-splash {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: var(--bg);
    z-index: 9999;
  }
  .noor-splash-bowl {
    animation: noor-bob 1.4s ease-in-out infinite;
    filter: drop-shadow(0 12px 24px rgba(42,166,58,0.18));
  }
  .noor-splash-bowl img { display: block; }
  .noor-splash-word {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: .3px;
    color: var(--brand-green);
  }
  .noor-splash-dots { display: flex; gap: 9px; }
  .noor-splash-dots span {
    width: 11px; height: 11px; border-radius: 50%;
    animation: noor-pop 1.1s ease-in-out infinite;
  }
  .noor-splash-dots span:nth-child(1){ background: var(--brand-green);  animation-delay: 0s;    }
  .noor-splash-dots span:nth-child(2){ background: var(--brand-orange); animation-delay: .12s;  }
  .noor-splash-dots span:nth-child(3){ background: var(--brand-blue);   animation-delay: .24s;  }
  .noor-splash-dots span:nth-child(4){ background: var(--brand-purple); animation-delay: .36s;  }
  .noor-splash-dots span:nth-child(5){ background: var(--brand-berry);  animation-delay: .48s;  }
  @keyframes noor-bob {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%     { transform: translateY(-12px) rotate(2deg); }
  }
  @keyframes noor-pop {
    0%,100% { transform: scale(.5); opacity: .35; }
    40%     { transform: scale(1);  opacity: 1;   }
  }
  @media (prefers-reduced-motion: reduce) {
    .noor-splash-bowl, .noor-splash-dots span { animation: none; }
  }
</style>
</head>

<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,so,ar,es',
      autoDisplay: false,
      layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL
    }, 'google_translate_element');
  }
  window.applyLanguage = function(code) {
    const value = code === 'en' ? '/en/en' : '/en/' + code;
    document.cookie = 'googtrans=' + value + '; path=/';
    document.cookie = 'googtrans=' + value + '; path=/; domain=' + location.hostname;
    document.documentElement.setAttribute('dir', code === 'ar' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', code);
    const trySelect = () => {
      const sel = document.querySelector('#google_translate_element select.goog-te-combo');
      if (!sel) return false;
      if (code === 'en') { if (sel.value && sel.value !== '') location.reload(); return true; }
      sel.value = code; sel.dispatchEvent(new Event('change')); return true;
    };
    if (!trySelect()) {
      let tries = 0;
      const iv = setInterval(() => {
        if (trySelect()) { clearInterval(iv); return; }
        if (tries++ > 40) { clearInterval(iv); location.reload(); }
      }, 150);
    }
  };
</script>
