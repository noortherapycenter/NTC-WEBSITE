<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Admin — Noor Therapy Center</title>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #fdfaf3;
    color: #1f2e1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  a { color: #2aa63a; }
  a:hover { color: #1f8a2e; }
  .card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border: 1.5px solid #e6e0cc;
    border-radius: 20px;
    padding: 40px 36px 34px;
    text-align: center;
    box-shadow: 0 24px 60px -30px rgba(31,46,26,.25);
  }
  .card img { height: 56px; margin-bottom: 18px; }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
  .sub { color: #4a5545; font-size: 13.5px; margin: 0 0 26px; line-height: 1.5; }
  .code {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 22px;
  }
  .code input {
    width: 52px; height: 60px;
    border: 1.8px solid #e6e0cc; border-radius: 12px;
    font-family: inherit; font-size: 26px; font-weight: 800; text-align: center;
    color: #1f2e1a; background: #fdfaf3;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .code input:focus {
    border-color: #2aa63a; background: #fff;
    box-shadow: 0 0 0 3px color-mix(in srgb, #2aa63a 15%, transparent);
  }
  .card.error .code input { border-color: #d64545; animation: shake .35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .msg { min-height: 18px; font-size: 12.5px; font-weight: 700; color: #d64545; margin-bottom: 14px; }
  button.go {
    width: 100%;
    font-family: inherit; font-size: 14.5px; font-weight: 700;
    color: #fff; background: #2aa63a;
    border: 0; border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: background .15s ease;
  }
  button.go:hover { background: #23902f; }
  .back { display: inline-block; margin-top: 20px; font-size: 13px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
  <div class="card" id="card">
    <img src="assets/noor-logo-mark.png" alt="Noor Therapy Center"/>
    <h1>Staff Access</h1>
    <p class="sub">Enter the 4-digit admin passcode to open the admin portal.</p>
    <form id="form" autocomplete="off">
      <div class="code">
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 1"/>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 2"/>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 3"/>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 4"/>
      </div>
      <div class="msg" id="msg"></div>
      <button type="submit" class="go">Unlock</button>
    </form>
    <a class="back" href="index.html">&larr; Back to website</a>
  </div>

<script>
(function () {
  'use strict';
  var HASH = '685a73d49840a6581e1ed74fcb043288e2c13df12ad7744a9b00c7042f12c84e';
  var SALT = 'noor-admin|';
  var DEST = 'staff-portal/index.html';
  var KEY  = 'noor-admin-auth';

  // already unlocked this tab? go straight in
  try { if (sessionStorage.getItem(KEY) === '1') location.replace(DEST); } catch (e) {}

  var inputs = Array.prototype.slice.call(document.querySelectorAll('.code input'));
  var card = document.getElementById('card');
  var msg = document.getElementById('msg');

  inputs[0].focus();
  inputs.forEach(function (inp, i) {
    inp.addEventListener('input', function () {
      inp.value = inp.value.replace(/\D/g, '').slice(-1);
      if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
      if (inputs.every(function (x) { return x.value; })) check();
    });
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
    inp.addEventListener('paste', function (e) {
      var t = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      if (t.length >= 2) {
        e.preventDefault();
        inputs.forEach(function (x, j) { x.value = t[j] || ''; });
        if (t.length >= 4) check(); else inputs[Math.min(t.length, 3)].focus();
      }
    });
  });

  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault();
    check();
  });

  function check() {
    var code = inputs.map(function (x) { return x.value; }).join('');
    if (code.length < 4) { fail('Enter all 4 digits'); return; }
    sha256(SALT + code).then(function (hex) {
      if (hex === HASH) {
        try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
        location.href = DEST;
      } else {
        fail('Incorrect passcode');
      }
    });
  }

  function fail(text) {
    msg.textContent = text;
    card.classList.add('error');
    setTimeout(function () { card.classList.remove('error'); }, 400);
    inputs.forEach(function (x) { x.value = ''; });
    inputs[0].focus();
  }

  function sha256(str) {
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function (buf) {
      return Array.prototype.map.call(new Uint8Array(buf), function (b) {
        return b.toString(16).padStart(2, '0');
      }).join('');
    });
  }
})();
</script>
</body>
</html>
